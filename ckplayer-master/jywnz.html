
<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title> 今夜为你醉</title>
		<link type="text/css" rel="stylesheet" href="ckplayer/css/ckplayer.css" />
		<!--
			如果需要使用其它语言，请在此处引入相应的js,比如:<script type="text/javascript" src="ckplayer/language/en.js" charset="UTF-8"></script>
		-->
		<script type="text/javascript" src="ckplayer/js/ckplayer.min.js" charset="UTF-8"></script>
		<style>
			.adfront{
				width: 100%;
				height: 100%;
				background: #000000;
				display: none;
			}
			.adfront .content{
				width: 50%;
				height: 50%;
				color: #FFF;
				position: absolute;
				background: #0000CC;
				top:0;
				bottom: 0;
				left: 0;
				right: 0;
				margin: auto;
				font-size: 30px;
				line-height: 38px;
				box-sizing:border-box;
				-moz-box-sizing:border-box; /* Firefox */
				-webkit-box-sizing:border-box; /* Safari */	
				padding: 50px;
			}

                        .adpause{
　　　　　　　　　　　　　　　　　width: 90%;
				height:　90%;
				max-width: 580px;
				max-height: 360px;
				color: #FFF;
				position: absolute;
				background: #07141E;
				top:0;
				bottom: 0;
				left: 0;
				right: 0;
				margin: auto;
				font-size: 30px;
				line-height: 38px;
				box-sizing:border-box;
				-moz-box-sizing:border-box; /* Firefox */
				-webkit-box-sizing:border-box; /* Safari */	
				padding: 20px;
				display: none;
			}
　　　　　　　　　　　　　.adpause .content{
				width: 50%;
				height: 50%;
				color: #FFF;
				position: absolute;
				background: #0000CC;
				top:0;
				bottom: 0;
				left: 0;
				right: 0;
				margin: auto;
				font-size: 30px;
				line-height: 38px;
				box-sizing:border-box;
				-moz-box-sizing:border-box; /* Firefox */
				-webkit-box-sizing:border-box; /* Safari */	
				padding: 50px;
			}
                            

                     .dm{
			    right: 0px;
			    bottom: 30px;
			    color: #FFF;
			    font-size: 20px;
			    line-height: 40px;
			    background-color: rgba(244, 67, 54, 0.9);
			    border-radius: 25px;
			    padding: 0 30px;
			    width: 200px;
			    cursor: pointer;
			    display: none;
			    white-space: nowrap; 
				overflow: hidden; 
				text-overflow: ellipsis;
			}
		</style>
	

		
	</head>
	<body>
		
		<div class="video" style="width: 100%; height: 500px;max-width: 800px;">播放容器</div>
		<script>
			//调用开始
			var videoObject = {
				container: '.video', //视频容器
				logo:'ckplayer/css/images/downloaded-image.png',
			
                autoplay:true,//自动播放
				poster:'video/poster.png',
			    	volume:0.2,
                                ad:{//定义广告
								front:{//定义贴片广告
									closeTime:3,//播放贴片广告时3秒后显示可关闭广告
									closeButtonClick:'closeFront',//点击关闭按钮触发事件
									list:[//贴片广告列表
											{
									            file: 'video/front01.mp4',
									            type: 'video/mp4',
									            link:'https://www.ckplayer.com/yytf',
									            time: 5
									        },
									        {
									            file: 'video/front04.jpg',//图片地址
									            type: 'picture',//广告类别定义成picture
									            link: 'https://www.ckplayer.com',//链接地址
									            time: 2//广告时长
									        },
									        {
									            content: '.adfront',//广告内容为一个自定义的层
									            type: 'node',//广告类别定义成node
									            time: 2//广告播放时长
									        }
									]
								},



                                                               //定义暂停广告
								pause:{//配置暂停广告
									close:true,//暂停广告是否显示关闭按钮
									list:[//暂停广告列表
										{
								            file: 'video/front03.jpg',//图片
								            link: 'https://www.ckplayer.com',
								         	time: 5//显示时长
								    	},
								        {
								            content: '.adpause',//显示一个层
								            type: 'node',//类别定义成node
								            time: 2//显示时长
								        }
									]
								}


	                           },

				
				
				
				//封面图片
				video:'https://lz.qaiu.top/parser?url=https://share.feijipan.com/s/Ha5DAaxr'//视频地址
			};
			var player=new ckplayer(videoObject)//调用播放器并赋值给变量player
			function closeFront(){//用户点击关闭广告触发
						player.closeFrontAd();//关闭广告
						};
                        var ele=player.layer({//新建一个元件，附值给变量ele
			    class:'dm',//弹幕的样式
			    content:'强肖萌的明天会更好！'
			});
			//animate-缓动函数
			ele.animate('left:'+(-ele.getWidth()+'px'),15000,'',function(){
			    ele.remove();//从页面中删除元件
			});
			//鼠标经过该元件时暂停缓动
			ele.mouseover(function(){
				this.animatePause();
			});
			//鼠标离开该元件时继续缓动
			ele.mouseout(function(){
				this.animatePlay();
			});
 
			/*    
			 * ===============================================================================================
			 * 以上代码已完成调用演示，下方的代码是演示监听动作和外部控制的部分
			 * ===============================================================================================
			 * ===============================================================================================
			 */
			player.play(function(){
				document.getElementById('state').innerHTML='监听到播放';
			});
			player.pause(function(){
				document.getElementById('state').innerHTML='监听到暂停';
			});
			player.volume(function(vol){
				document.getElementById('state').innerHTML='监听到音量改变：'+vol;
			});
			player.muted(function(b){
				document.getElementById('state2').innerHTML='监听到静音状态：'+b;
			});
			player.full(function(b){
				document.getElementById('state').innerHTML='监听到全屏状态：'+b;
			});
			player.ended(function(){
				document.getElementById('state').innerHTML='监听到播放结束';
			});
		</script>
		<div class="adfront"><div class="content">前置广告<br />这是一个普通的DIV层，可以放置任意内容</div></div>
                <div class="adpause"><div class="content">暂停广告<br />这是一个普通的DIV层，可以放置任意内容</div>
</div>
		
		<p>官网：<a href="https://www.ckplayer.com" target="_blank">www.ckplayer.com</a></p>
		<p>手册：<a href="https://www.ckplayer.com/manual/" target="_blank">www.ckplayer.com/manual/</a></p>
		<p>社区：<a href="https://bbs.ckplayer.com/" target="_blank">bbs.ckplayer.com</a></p>
		<p>全功能演示：<a href="https://www.ckplayer.com/demo.html" target="_blank">www.ckplayer.com/demo.html</a></p>
		<p>控制示例：</p>
		<p>
			<button type="button" onclick="player.play()" >播放</button>
			<button type="button" onclick="player.pause()" >暂停</button>
			<button type="button" onclick="player.seek(20)" >跳转</button>
			<button type="button" onclick="player.volume(0.6)">修改音量</button>
			<button type="button" onclick="player.muted()">静音</button>
			<button type="button" onclick="player.exitMuted()">恢复音量</button>
			<button type="button" onclick="player.full()">全屏</button>
			<button type="button" onclick="player.webFull()">页面全屏</button>
			<button type="button" onclick="player.theatre()">剧场模式</button>
			<button type="button" onclick="player.exitTheatre()">退出剧场模式</button>
		</p>
		<p id="state"></p>
		<p id="state2"></p>
	</body>
</html>
